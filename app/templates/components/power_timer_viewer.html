<style>
.viewer-timer{
  margin-top:18px;
  display:grid;
  grid-template-columns:minmax(110px,auto) 1fr auto;
  align-items:center;
  gap:16px;
  padding:16px 18px;
  border-radius:18px;
  background:linear-gradient(135deg,#fff 0%,#fffaf0 100%);
  border:1px solid rgba(244,186,42,.35);
  box-shadow:0 10px 28px rgba(30,30,30,.06);
  overflow:hidden;
  position:relative;
}
.viewer-timer::after{
  content:"";
  position:absolute;
  inset:auto -44px -70px auto;
  width:150px;
  height:150px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(244,186,42,.22),transparent 70%);
  pointer-events:none;
}
.viewer-timer-icon{
  width:58px;
  height:58px;
  border-radius:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#1E1E1E;
  color:#F4BA2A;
  font-size:24px;
  box-shadow:0 10px 18px rgba(30,30,30,.16);
  position:relative;
  z-index:1;
}
.viewer-timer-main{
  min-width:0;
  position:relative;
  z-index:1;
}
.viewer-timer-eyebrow{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:5px;
  font-size:12px;
  font-weight:800;
  color:#8A8884;
}
.viewer-timer-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#8A8884;
}
.viewer-timer[data-state="running"] .viewer-timer-dot{background:#1f8f51;box-shadow:0 0 0 5px rgba(31,143,81,.12)}
.viewer-timer[data-state="paused"] .viewer-timer-dot{background:#B45309;box-shadow:0 0 0 5px rgba(180,83,9,.12)}
.viewer-timer[data-state="alarm"] .viewer-timer-dot{background:#C0392B;box-shadow:0 0 0 5px rgba(192,57,43,.12)}
.viewer-timer-title{
  margin:0;
  font-size:18px;
  font-weight:800;
  color:#1E1E1E;
}
.viewer-timer-phase{
  margin-top:4px;
  font-size:13px;
  color:#51504D;
  line-height:1.5;
}
.viewer-timer-clock{
  direction:ltr;
  min-width:128px;
  text-align:center;
  padding:10px 14px;
  border-radius:16px;
  background:#1E1E1E;
  color:#F4BA2A;
  font-size:28px;
  font-weight:800;
  font-family:Consolas,monospace;
  letter-spacing:.04em;
  position:relative;
  z-index:1;
}
.viewer-timer-progress{
  grid-column:1 / -1;
  height:8px;
  border-radius:999px;
  background:#F0EDE3;
  overflow:hidden;
  position:relative;
  z-index:1;
}
.viewer-timer-progress span{
  display:block;
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#F4BA2A,#FFD96A);
  transition:width .45s linear;
}
@media (max-width:680px){
  .viewer-timer{grid-template-columns:auto 1fr;align-items:start}
  .viewer-timer-clock{grid-column:1 / -1;width:100%;font-size:24px}
}
</style>

<section class="viewer-timer" data-power-timer-viewer data-state="loading" aria-label="عداد تحويل الكهرباء">
  <div class="viewer-timer-icon" aria-hidden="true"><i class="fa-solid fa-stopwatch"></i></div>
  <div class="viewer-timer-main">
    <div class="viewer-timer-eyebrow"><span class="viewer-timer-dot"></span><span data-timer-state-label>جار قراءة العداد</span></div>
    <h2 class="viewer-timer-title">عداد تحويل الكهرباء</h2>
    <div class="viewer-timer-phase" data-timer-phase>يظهر هنا عداد تحويل الكهرباء الذي تضبطه الإدارة للمتابعة فقط.</div>
  </div>
  <div class="viewer-timer-clock" data-timer-clock>--:--</div>
  <div class="viewer-timer-progress" aria-hidden="true"><span data-timer-progress></span></div>
</section>

<script>
(function(){
  var box = document.querySelector('[data-power-timer-viewer]');
  if(!box || box.dataset.bound === '1') return;
  box.dataset.bound = '1';

  var stateLabel = box.querySelector('[data-timer-state-label]');
  var phase = box.querySelector('[data-timer-phase]');
  var clock = box.querySelector('[data-timer-clock]');
  var progress = box.querySelector('[data-timer-progress]');

  function fmt(seconds){
    seconds = Math.max(0, parseInt(seconds || 0, 10));
    var h = Math.floor(seconds / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    var s = seconds % 60;
    function pad(n){ return String(n).padStart(2, '0'); }
    return h > 0 ? (pad(h) + ':' + pad(m) + ':' + pad(s)) : (pad(m) + ':' + pad(s));
  }
  function label(state){
    if(state === 'running') return 'العداد يعمل';
    if(state === 'paused') return 'متوقف مؤقتا';
    if(state === 'alarm') return 'انتهى الوقت';
    if(state === 'stopped') return 'متوقف';
    return 'غير متوفر حاليًا';
  }
  function apply(data){
    if(!data || !data.ok) throw new Error('bad timer payload');
    var state = data.state || 'stopped';
    var duration = Math.max(60, parseInt(data.duration_seconds || ((data.duration_minutes || 30) * 60), 10));
    var remaining = Math.max(0, parseInt(data.display_remaining_seconds || 0, 10));
    var pct = state === 'stopped' ? 0 : Math.min(100, Math.max(0, ((duration - remaining) / duration) * 100));
    box.setAttribute('data-state', state);
    stateLabel.textContent = label(state);
    phase.textContent = data.phase_label || 'حالة العداد غير متاحة الآن.';
    clock.textContent = fmt(remaining);
    progress.style.width = pct + '%';
  }
  function refresh(){
    fetch('/portal/power-timer/status', {headers:{'Accept':'application/json'}})
      .then(function(r){ return r.json(); })
      .then(apply)
      .catch(function(){
        box.setAttribute('data-state', 'unknown');
        stateLabel.textContent = 'تعذر التحديث';
        phase.textContent = 'لم نتمكن من قراءة العداد الآن.';
        clock.textContent = '--:--';
        progress.style.width = '0%';
      });
  }
  refresh();
  window.setInterval(refresh, 5000);
})();
</script>
