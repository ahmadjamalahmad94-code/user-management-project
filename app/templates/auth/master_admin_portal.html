<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>HobeHub — Master Gateway</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Cairo','Tajawal',system-ui,-apple-system,sans-serif;
  background:#0a0a0a;color:#fff;overflow:hidden;
  display:grid;place-items:center;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ─── Animated background layers ─── */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(244,186,42,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(244,186,42,.04) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;z-index:0;
  animation:gridFloat 30s linear infinite;
}
@keyframes gridFloat{
  from{transform:translate(0,0)}
  to{transform:translate(60px,60px)}
}
.bg-gradient{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(244,186,42,.18), transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(124,58,237,.15), transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(239,68,68,.08), transparent 60%),
    linear-gradient(135deg, #0a0a0a 0%, #1a1614 50%, #0f0c0a 100%);
  z-index:0;pointer-events:none;
}
.bg-orb{
  position:fixed;border-radius:50%;filter:blur(60px);opacity:.45;
  pointer-events:none;z-index:0;
}
.bg-orb.o1{width:380px;height:380px;background:#F4BA2A;top:-100px;right:-100px;animation:orbFloat1 14s ease-in-out infinite}
.bg-orb.o2{width:300px;height:300px;background:#7c3aed;bottom:-80px;left:-80px;animation:orbFloat2 18s ease-in-out infinite}
.bg-orb.o3{width:200px;height:200px;background:#FFD96A;top:50%;left:20%;animation:orbFloat3 22s ease-in-out infinite;opacity:.25}
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,40px) scale(1.1)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-30px) scale(1.15)}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,30px)}}

/* ─── Card ─── */
.gateway{
  position:relative;z-index:10;
  width:min(440px, calc(100vw - 32px));
  padding:42px 36px 36px;
  border-radius:24px;
  background:rgba(20,18,16,.65);
  backdrop-filter:blur(28px) saturate(140%);
  -webkit-backdrop-filter:blur(28px) saturate(140%);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:
    0 0 0 1px rgba(244,186,42,.08) inset,
    0 30px 60px -20px rgba(0,0,0,.7),
    0 0 80px -20px rgba(244,186,42,.22);
  animation:cardIn .9s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(30px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Premium top border glow */
.gateway::before{
  content:"";position:absolute;inset:-1px;border-radius:24px;
  background:linear-gradient(135deg, rgba(244,186,42,.55), transparent 40%, transparent 60%, rgba(244,186,42,.30));
  z-index:-1;opacity:.7;
  filter:blur(.5px);
}

/* ─── Brand ─── */
.brand{display:flex;align-items:center;gap:14px;margin-bottom:28px;justify-content:center;flex-direction:column}
.brand-logo{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg, #F4BA2A 0%, #FFD96A 60%, #d8a11c 100%);
  display:grid;place-items:center;
  font-size:28px;font-weight:900;color:#1E1E1E;
  box-shadow:
    0 14px 36px rgba(244,186,42,.50),
    0 0 0 1px rgba(255,255,255,.12),
    inset 0 1px 1px rgba(255,255,255,.40);
  position:relative;
  animation:logoGlow 4s ease-in-out infinite alternate;
}
@keyframes logoGlow{
  from{box-shadow:0 14px 36px rgba(244,186,42,.50),0 0 0 1px rgba(255,255,255,.12),inset 0 1px 1px rgba(255,255,255,.40)}
  to{box-shadow:0 20px 60px rgba(244,186,42,.85),0 0 0 1px rgba(255,255,255,.18),inset 0 1px 1px rgba(255,255,255,.40)}
}
.brand-logo::after{
  content:"";position:absolute;inset:-3px;border-radius:21px;
  border:1.5px solid rgba(244,186,42,.30);
  animation:logoPulse 2.4s ease-out infinite;
}
@keyframes logoPulse{
  0%{transform:scale(.95);opacity:.55}
  80%{transform:scale(1.25);opacity:0}
  100%{opacity:0}
}
.brand-text{text-align:center}
.brand-name{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1}
.brand-name span{color:#F4BA2A}
.brand-tag{font-size:11.5px;font-weight:700;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:1.5px;text-transform:uppercase}

/* ─── Heading ─── */
.head{text-align:center;margin-bottom:24px}
.head-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:999px;
  background:rgba(244,186,42,.12);border:1px solid rgba(244,186,42,.25);
  color:#F4BA2A;font-size:11px;font-weight:800;letter-spacing:.5px;
  margin-bottom:14px;
}
.head-badge i{font-size:10px}
.head h1{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:6px}
.head p{font-size:12.5px;color:rgba(255,255,255,.55);line-height:1.8;max-width:320px;margin:0 auto}

/* ─── Form ─── */
.field{margin-bottom:14px}
.field-label{
  display:block;font-size:11px;font-weight:800;letter-spacing:.4px;
  color:rgba(255,255,255,.55);margin-bottom:7px;text-transform:uppercase;
}
.field-wrap{
  position:relative;display:flex;align-items:center;
  background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.10);
  border-radius:13px;
  transition:all .25s cubic-bezier(.16,1,.3,1);
}
.field-wrap:focus-within{
  background:rgba(255,255,255,.07);
  border-color:rgba(244,186,42,.55);
  box-shadow:0 0 0 4px rgba(244,186,42,.14), 0 8px 22px -8px rgba(244,186,42,.25);
}
.field-wrap > i{
  position:absolute;inset-inline-start:14px;color:rgba(255,255,255,.40);
  font-size:13px;pointer-events:none;transition:color .2s;
}
.field-wrap:focus-within > i{color:#F4BA2A}
.field-wrap input{
  width:100%;border:0;background:transparent;outline:0;
  padding:13px 14px 13px 42px;
  font-family:inherit;font-size:14px;font-weight:700;color:#fff;
  letter-spacing:.3px;
}
.field-wrap input::placeholder{color:rgba(255,255,255,.30);font-weight:600}
.field-wrap input[type="password"]{letter-spacing:6px}
.field-wrap input[type="password"]::placeholder{letter-spacing:0}

.eye-toggle{
  position:absolute;inset-inline-end:12px;
  background:transparent;border:0;color:rgba(255,255,255,.40);
  cursor:pointer;padding:6px;border-radius:8px;font-size:13px;
  transition:.15s ease;
}
.eye-toggle:hover{color:#F4BA2A;background:rgba(244,186,42,.10)}

/* ─── Submit ─── */
.cta{
  width:100%;margin-top:8px;
  padding:14px 22px;border-radius:13px;border:0;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:900;letter-spacing:.3px;
  background:linear-gradient(135deg, #F4BA2A 0%, #FFD96A 50%, #F4BA2A 100%);
  background-size:200% 100%;
  color:#1E1E1E;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 14px 36px -8px rgba(244,186,42,.55), inset 0 1px 0 rgba(255,255,255,.40);
  transition:all .3s cubic-bezier(.16,1,.3,1);
  position:relative;overflow:hidden;
}
.cta::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg, transparent 30%, rgba(255,255,255,.30) 50%, transparent 70%);
  transform:translateX(-100%);transition:transform .6s ease;
}
.cta:hover{
  background-position:100% 0;
  box-shadow:0 20px 50px -8px rgba(244,186,42,.75), inset 0 1px 0 rgba(255,255,255,.50);
  transform:translateY(-2px);
}
.cta:hover::before{transform:translateX(100%)}
.cta:active{transform:translateY(0)}
.cta:disabled{opacity:.55;cursor:wait;transform:none}
.cta i{font-size:13px;transition:transform .3s}
.cta:hover i{transform:translateX(-3px)}

/* ─── Messages ─── */
.msg{
  display:none;margin-bottom:14px;padding:11px 14px;border-radius:11px;
  font-size:12.5px;font-weight:700;line-height:1.6;
}
.msg.show{display:block;animation:msgIn .3s ease}
.msg.err{background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.30)}
.msg.ok{background:rgba(34,197,94,.14);color:#86efac;border:1px solid rgba(34,197,94,.30)}
.msg.info{background:rgba(244,186,42,.10);color:#FFD96A;border:1px solid rgba(244,186,42,.25)}
@keyframes msgIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* ─── Footer ─── */
.foot{
  margin-top:24px;padding-top:18px;
  border-top:1px solid rgba(255,255,255,.06);
  text-align:center;
}
.foot small{
  font-size:10.5px;color:rgba(255,255,255,.32);letter-spacing:.5px;
  display:inline-flex;align-items:center;gap:6px;
}
.foot small i{color:#F4BA2A;font-size:9px}

/* Hidden state for the second step */
.step{display:none}
.step.is-on{display:block;animation:stepIn .4s ease}
@keyframes stepIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Loading spinner inside button */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(30,30,30,.30);border-top-color:#1E1E1E;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width:480px){
  .gateway{padding:32px 24px 28px}
  .brand-logo{width:54px;height:54px;font-size:24px}
  .brand-name{font-size:19px}
}
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-grid"></div>
<div class="bg-gradient"></div>
<div class="bg-orb o1"></div>
<div class="bg-orb o2"></div>
<div class="bg-orb o3"></div>

<!-- Main card -->
<main class="gateway" role="main">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">H</div>
    <div class="brand-text">
      <div class="brand-name">Hobe<span>Hub</span></div>
      <div class="brand-tag">Master Gateway</div>
    </div>
  </div>

  <!-- Step 1: Identify user -->
  <section class="step is-on" id="step-check">
    <div class="head">
      <span class="head-badge"><i class="fa-solid fa-shield-halved"></i>دخول إداري آمن</span>
      <h1>أهلاً بك في البوابة</h1>
      <p>أدخل اسم المستخدم أو رقم الجوال للمتابعة. صفحتك المخصصة ستظهر تلقائياً.</p>
    </div>

    <div class="msg" id="msg-check"></div>

    <form id="form-check" autocomplete="on">
      <div class="field">
        <label class="field-label" for="username">اسم المستخدم أو الجوال</label>
        <div class="field-wrap">
          <i class="fa-solid fa-user-shield"></i>
          <input type="text" id="username" name="username" autocomplete="username" inputmode="text" required autofocus placeholder="admin أو 05xxxxxxxx">
        </div>
      </div>
      <button class="cta" type="submit" id="btn-check">
        <span>متابعة</span>
        <i class="fa-solid fa-arrow-left"></i>
      </button>
    </form>
  </section>

  <!-- Step 2: Password -->
  <section class="step" id="step-password">
    <div class="head">
      <span class="head-badge"><i class="fa-solid fa-key"></i>التحقق</span>
      <h1 id="welcome-name">أهلاً</h1>
      <p>أدخل كلمة المرور لإكمال تسجيل الدخول.</p>
    </div>

    <div class="msg" id="msg-password"></div>

    <form id="form-password">
      <div class="field">
        <label class="field-label" for="password">كلمة المرور</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
          <button type="button" class="eye-toggle" id="eye-toggle" title="إظهار/إخفاء">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>
      <button class="cta" type="submit" id="btn-password">
        <span>تسجيل الدخول</span>
        <i class="fa-solid fa-arrow-left"></i>
      </button>
    </form>
  </section>

  <div class="foot">
    <small><i class="fa-solid fa-lock"></i>اتصال مشفّر • Hobe<span style="color:#F4BA2A">Hub</span> Console</small>
  </div>
</main>

<script>
(function(){
  const stepCheck    = document.getElementById('step-check');
  const stepPassword = document.getElementById('step-password');
  const formCheck    = document.getElementById('form-check');
  const formPassword = document.getElementById('form-password');
  const usernameIn   = document.getElementById('username');
  const passwordIn   = document.getElementById('password');
  const btnCheck     = document.getElementById('btn-check');
  const btnPassword  = document.getElementById('btn-password');
  const msgCheck     = document.getElementById('msg-check');
  const msgPwd       = document.getElementById('msg-password');
  const welcome      = document.getElementById('welcome-name');
  const eyeToggle    = document.getElementById('eye-toggle');

  function showMsg(el, kind, text){
    el.className = 'msg show ' + kind;
    el.textContent = text;
  }
  function clearMsg(el){ el.className = 'msg'; el.textContent = ''; }
  function setLoading(btn, label, on){
    btn.disabled = !!on;
    if(on){
      btn.innerHTML = '<span class="spin"></span><span>' + label + '</span>';
    } else {
      btn.innerHTML = '<span>' + label + '</span><i class="fa-solid fa-arrow-left"></i>';
    }
  }

  // Eye toggle
  eyeToggle.addEventListener('click', () => {
    const isPwd = passwordIn.type === 'password';
    passwordIn.type = isPwd ? 'text' : 'password';
    eyeToggle.querySelector('i').className = isPwd ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    passwordIn.focus();
  });

  // Step 1: check
  formCheck.addEventListener('submit', (e) => {
    e.preventDefault();
    clearMsg(msgCheck);
    const v = usernameIn.value.trim();
    if(!v){ showMsg(msgCheck, 'err', 'الرجاء إدخال اسم المستخدم أو رقم الجوال.'); return; }
    setLoading(btnCheck, 'جارٍ التحقق…', true);

    const fd = new FormData();
    fd.append('username', v);

    fetch('/login/check', { method:'POST', body:fd, credentials:'same-origin' })
      .then(r => r.json())
      .then(d => {
        setLoading(btnCheck, 'متابعة', false);
        if(!d || !d.ok){
          showMsg(msgCheck, 'err', (d && d.message) || 'لم يتم العثور على الحساب.');
          return;
        }
        // Welcome message uses display_name if present
        welcome.textContent = (d.display_name ? 'أهلاً ' + d.display_name : 'أهلاً بك');
        // Decide flow
        if(d.must_activate){
          showMsg(msgCheck, 'info', 'حسابك يحتاج لتفعيل. استخدم رابط الدخول العام بدلاً من هذه البوابة.');
          return;
        }
        // Move to password step
        stepCheck.classList.remove('is-on');
        stepPassword.classList.add('is-on');
        setTimeout(() => passwordIn.focus(), 250);
      })
      .catch(() => {
        setLoading(btnCheck, 'متابعة', false);
        showMsg(msgCheck, 'err', 'تعذّر الاتصال بالخادم. تحقّق من اتصالك.');
      });
  });

  // Step 2: submit password
  formPassword.addEventListener('submit', (e) => {
    e.preventDefault();
    clearMsg(msgPwd);
    const u = usernameIn.value.trim();
    const p = passwordIn.value;
    if(!p){ showMsg(msgPwd, 'err', 'الرجاء إدخال كلمة المرور.'); return; }
    setLoading(btnPassword, 'جارٍ الدخول…', true);

    const fd = new FormData();
    fd.append('username', u);
    fd.append('password', p);

    fetch('/login/submit', { method:'POST', body:fd, credentials:'same-origin' })
      .then(r => r.json())
      .then(d => {
        if(d && d.ok){
          showMsg(msgPwd, 'ok', '✓ تم الدخول بنجاح — جارٍ التحويل…');
          setTimeout(() => {
            window.location.href = d.redirect_url || '/admin/dashboard';
          }, 600);
        } else {
          setLoading(btnPassword, 'تسجيل الدخول', false);
          showMsg(msgPwd, 'err', (d && d.message) || 'كلمة المرور غير صحيحة.');
          passwordIn.select();
        }
      })
      .catch(() => {
        setLoading(btnPassword, 'تسجيل الدخول', false);
        showMsg(msgPwd, 'err', 'تعذّر الاتصال بالخادم.');
      });
  });
})();
</script>
</body>
</html>
